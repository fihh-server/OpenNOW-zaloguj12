name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, e.g. 1.2.3 or v1.2.3
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"
      - "opennow-stable-v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      source_ref: ${{ steps.release.outputs.source_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: opennow-stable/package-lock.json

      - name: Install dependencies
        working-directory: opennow-stable
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Typecheck
        working-directory: opennow-stable
        run: npm run typecheck --if-present

      - name: Resolve release metadata
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          raw="${INPUT_VERSION:-$REF_NAME}"
          case "$raw" in
            opennow-stable-v*) version="${raw#opennow-stable-v}" ;;
            v*) version="${raw#v}" ;;
            *) version="$raw" ;;
          esac

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: $raw" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          make_latest=true
          if [[ "$prerelease" == true ]]; then
            make_latest=false
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="v${version}"
            source_ref="$REF_NAME"
          else
            release_tag="$raw"
            source_ref="$REF_NAME"
          fi

          {
            echo "version=$version"
            echo "prerelease=$prerelease"
            echo "make_latest=$make_latest"
            echo "release_tag=$release_tag"
            echo "source_ref=$source_ref"
          } >> "$GITHUB_OUTPUT"

  prepare-source:
    name: prepare-source
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: preflight
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.source.outputs.release_sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.source_ref }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync or validate release version
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
          SOURCE_REF: ${{ needs.preflight.outputs.source_ref }}
        run: |
          if [[ "$EVENT_NAME" != "workflow_dispatch" ]]; then
            node opennow-stable/scripts/sync-release-version.mjs --check "$RELEASE_VERSION"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$REF_TYPE" != "branch" ]]; then
            echo "workflow_dispatch releases must run from a branch so the version bump can be committed before tagging." >&2
            exit 1
          fi

          node opennow-stable/scripts/sync-release-version.mjs "$RELEASE_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add opennow-stable/package.json opennow-stable/package-lock.json
          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
          else
            git commit -m "chore(release): prepare v${RELEASE_VERSION}"
            git push origin HEAD:"$SOURCE_REF"
          fi
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs:
      - preflight
      - prepare-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: blacksmith-4vcpu-windows-2025
            builder_args: "--win nsis portable --x64"
            artifact_paths: |
              opennow-stable/dist-release/*-x64.exe
              opennow-stable/dist-release/latest*.yml
              opennow-stable/dist-release/*.blockmap
          - label: windows-arm64
            os: blacksmith-4vcpu-windows-2025
            builder_args: "--win nsis portable --arm64"
            artifact_paths: |
              opennow-stable/dist-release/*-arm64.exe
          - label: macos-x64
            os: macos-latest
            builder_args: "--mac dmg zip --x64"
            artifact_paths: |
              opennow-stable/dist-release/*.dmg
              opennow-stable/dist-release/*-x64.zip
          - label: macos-arm64
            os: macos-latest
            builder_args: "--mac dmg zip --arm64"
            artifact_paths: |
              opennow-stable/dist-release/*.dmg
              opennow-stable/dist-release/*-arm64.zip
          - label: linux-x64
            os: blacksmith-4vcpu-ubuntu-2404
            builder_args: "--linux AppImage deb --x64"
            artifact_paths: |
              opennow-stable/dist-release/*-x86_64.AppImage
              opennow-stable/dist-release/*-amd64.deb
              opennow-stable/dist-release/latest-linux.yml
          - label: linux-arm64
            os: blacksmith-4vcpu-ubuntu-2404-arm
            builder_args: "--linux AppImage deb --arm64"
            artifact_paths: |
              opennow-stable/dist-release/*-arm64.AppImage
              opennow-stable/dist-release/*-arm64.deb
              opennow-stable/dist-release/latest-linux-arm64.yml

    defaults:
      run:
        working-directory: opennow-stable

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      npm_config_audit: "false"
      npm_config_fund: "false"
      RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
      USE_SYSTEM_FPM: ${{ matrix.label == 'linux-arm64' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-source.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install FPM for arm64 deb builds
        if: matrix.label == 'linux-arm64'
        run: sudo apt-get install -y ruby ruby-dev build-essential && sudo gem install fpm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Sync package version
        run: node scripts/sync-release-version.mjs "$RELEASE_VERSION"

      - name: Build app bundles
        run: npm run build

      - name: Package installers
        run: npx electron-builder --publish never ${{ matrix.builder_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennow-stable-${{ matrix.label }}
          # electron-updater still consumes a single Windows latest.yml feed.
          # Keep that metadata x64-only so ARM64 release assets cannot overwrite it.
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs:
      - preflight
      - prepare-source
      - build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.release_tag }}
          target_commitish: ${{ needs.prepare-source.outputs.release_sha }}
          name: OpenNOW v${{ needs.preflight.outputs.version }}
          prerelease: ${{ needs.preflight.outputs.prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          generate_release_notes: true
          files: release-artifacts/**/*
